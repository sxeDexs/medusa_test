version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - medusa_network

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - medusa_network

  medusa:
    build:
      context: ./my-medusa-store
      dockerfile: Dockerfile.prod
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    env_file:
      - ./my-medusa-store/.env.prod
    environment:
      - MEDUSA_ADMIN_EMAIL=${MEDUSA_ADMIN_EMAIL}
      - MEDUSA_ADMIN_PASSWORD=${MEDUSA_ADMIN_PASSWORD}
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medusa.rule=Host(`admin.mm.dev.gorgojs.ru`)"
      - "traefik.http.routers.medusa.entrypoints=websecure"
      - "traefik.http.routers.medusa.tls.certresolver=myresolver"
      - "traefik.http.services.medusa.loadbalancer.server.port=9000"
    networks:
      - medusa_network

  storefront:
    build:
      context: ./my-medusa-store-storefront
      dockerfile: Dockerfile.prod
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
    env_file:
      - ./my-medusa-store-storefront/.env.prod
    depends_on:
      - medusa
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storefront.rule=Host(`mm.dev.gorgojs.ru`)"
      - "traefik.http.routers.storefront.entrypoints=websecure"
      - "traefik.http.routers.storefront.tls.certresolver=myresolver"
      - "traefik.http.services.storefront.loadbalancer.server.port=8000"
    networks:
      - medusa_network

  traefik:
    image: traefik:v3.0
    restart: always
    privileged: true
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=you@email.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - medusa_network

volumes:
  postgres_data:
  minio_data:

networks:
  medusa_network:
    driver: bridge
