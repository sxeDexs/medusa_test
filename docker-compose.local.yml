version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  minio:
    image: minio/minio:latest
    container_name: medusa_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    networks:
      - medusa_network

  medusa:
    build: ./my-medusa-store
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./my-medusa-store/.env 
    volumes:
      - ./my-medusa-store:/server
      - /server/node_modules
    networks:
      - medusa_network

  storefront:
    build: ./my-medusa-store-storefront
    container_name: storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    env_file:
      - ./my-medusa-store-storefront/.env.local
    volumes:
      - ./my-medusa-store-storefront:/app
      - /app/node_modules
    networks:
      - medusa_network

volumes:
  postgres_data:
  minio_data:

networks:
  medusa_network:
    driver: bridge
